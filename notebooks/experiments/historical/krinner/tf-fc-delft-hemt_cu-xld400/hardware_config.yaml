######################
# Fridge Configuration
######################
FRIDGE_NAME: XLD400

######################
# Qubit Configuration
######################
QUBIT_FREQ:     "TUNABLE"
QUBIT_COUPLING: "TUNABLE"  

QUBIT_TYPES: # from spreadsheet (inspired by 2017versluisScalableQuantumCircuit)
    DATA : 4 
    ANCILLA: 4
    COUPLER: 8 # actually there is no coupler wire. 2Q gates are performed by pulses in the flux bias cable

OPERATIONS:
    - 1Q
    - 2Q
    - READOUT
    - IDLE

DRIVE_MUX: 1 # Number of signals that are frequency multiplexed in a single DRIVE line
READIN_MUX: 1 # Number of signals that are frequency multiplexed in a single READOUT_PIN line
READOUT_GROUP_SIZE: 4 # [2025springFastMultiplexedSuperconductingQubit]

######################
# Cable Configuration
######################
CABLE_TYPES:
  - DRIVE    # Single + Two Qubit Gate Operations
  - FLUX_BIAS # Qubit Biasing Line
  - COUPLER     # 2Q operations
  - PUMP
  - READOUT_PIN
  - READOUT_POUT
  - AMP_BIAS  # Amplifier Biasing Line
  - DC_TERMINAL # Directional Coupler termination relocated to 4K

DC_PARAMS:
    R_4K: 1249.875
    R_Still: 0 # NbTi
    R_CP: 0 # NbTi
    R_MXC: 0 # NbTi
    I_BIAS: 0.57E-3 #sqrt(Imax/3), Imax = 1
    I_2Q: 0.4E-3


CABLE_CONFIG_NAMES: 
  DRIVE: # [https://delft-circuits.com/product-overview/drive-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: Ag
    CP:    Ag
    MXC:   Ag
  FLUX_BIAS:  # [https://delft-circuits.com/product-overview/flux-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: NbTi
    CP:    NbTi
    MXC:   NbTi
  COUPLER: # [https://delft-circuits.com/product-overview/flux-lines/]
    RT:    null
    50K:   GHOST
    4K:    GHOST
    Still: GHOST
    CP:    GHOST
    MXC:   GHOST
  PUMP: # [https://delft-circuits.com/product-overview/read-out-dc-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: Ag
    CP:    Ag
    MXC:   Ag
  READOUT_PIN: # [https://delft-circuits.com/product-overview/read-out-dc-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: Ag
    CP:    Ag
    MXC:   Ag
  READOUT_POUT: # [https://delft-circuits.com/product-overview/read-out-dc-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: NbTi
    CP:    NbTi
    MXC:   NbTi
  AMP_BIAS:  # DC Bias Lines
    RT:    null
    50K:   Cu_35_bias
    4K:    Cu_35_bias
    Still: null
    CP:    null
    MXC:   null
  DC_TERMINAL:  # Directional Coupler termination relocated to 4K
    RT:    null
    50K:   null
    4K:    null 
    Still: NbTi
    CP:    NbTi
    MXC:   NbTi

###################
# Activation Matrix
###################
# Describes which cables can perform what operations
ACTIVATION_MATRIX:
    DRIVE:
        - 1Q
        #- 2Q
    FLUX_BIAS: # always ON
        - IDLE
    COUPLER: 
        - 2Q
    PUMP:
        - READOUT
    READOUT_PIN:
        - READOUT
    READOUT_POUT:
        - READOUT
    AMP_BIAS: # always ON
        - IDLE
    DC_TERMINAL: # always ON
        - IDLE

##########################
# Attenuator Configuration
##########################
ATT_CONFIG: # arbitrary adding to 60 dB
  DRIVE: # 
    RT:    0
    50K:   0
    4K:    20
    Still: 0
    CP:    20
    MXC:   20
  FLUX_BIAS: 
    RT:    0
    50K:   0
    4K:    0 # modelling 20dB attenuation as ohmic resistor
    Still: 0
    CP:    0
    MXC:   0
  COUPLER: # [https://delft-circuits.com/product-overview/flux-lines/, 
    RT:    0
    50K:   0
    4K:    0 # modelling 20dB attenuation as ohmic resistor
    Still: 0
    CP:    0  
    MXC:   0
  PUMP: # [2019krinnerEngineeringCryogenicSetups, 2024gunyhoSingleshotReadoutSuperconducting]
    RT:    0
    50K:   0
    4K:    20
    Still: 0
    CP:    10
    MXC:   20
  READOUT_PIN: # Assuming same as the DRIVE line
    RT:    0
    50K:   0
    4K:    20
    Still: 0
    CP:    20
    MXC:   20
  READOUT_POUT:
    RT:    0
    50K:   0
    4K:    0
    Still: 0
    CP:    0
    MXC:   0
  AMP_BIAS: 
    RT:    0
    50K:   0
    4K:    0
    Still: 0
    CP:    0
    MXC:   0
  DC_TERMINAL: 
    RT:    0
    50K:   0
    4K:    0
    Still: 0
    CP:    0
    MXC:   0

