######################
# Fridge Configuration
######################
FRIDGE_NAME: KIDE_v3

######################
# Qubit Configuration
######################
QUBIT_FREQ:     "FIXED"
QUBIT_COUPLING: "FIXED"  

QUBIT_TYPES: # from spreadsheet (inspired by 2017versluisScalableQuantumCircuit)
    DATA : 4 
    ANCILLA: 4
    # COUPLER: 14 # Refer Explanations no. 5

OPERATIONS:
    - 1Q
    - 2Q
    - READOUT
    - IDLE

DRIVE_MUX: 1 # Number of signals that are frequency multiplexed in a single DRIVE line
READIN_MUX: 1 # Number of signals that are frequency multiplexed in a single READOUT_PIN line
READOUT_GROUP_SIZE: 4 # [2025springFastMultiplexedSuperconductingQubit]

######################
# Cable Configuration
######################
CABLE_TYPES:
  - DRIVE    # Single + Two Qubit Gate Operations
  # - FLUX_BIAS # Qubit Biasing Line
  # - COUPLER     # 2Q operations
  - PUMP
  - READOUT_PIN
  - READOUT_POUT
  - AMP_BIAS  # Amplifier Biasing Line
  - AMP_BIAS_50K  # Amplifier Biasing Line
  - DC_TERMINAL # Directional Coupler termination relocated to 4K

# DC_PARAMS:
#     R_4K: 0.14
#     R_CP: 0.0 # Assuming superconducting NbTi lines below 4K for FLUX_BIAS
#     R_MXC: 0.0 # Assuming superconducting NbTi lines below 4K for FLUX_BIAS
#     I_BIAS: 1.0E-3
#     I_2Q: 0.0 #0.4E-3


CABLE_CONFIG_NAMES: 
  DRIVE: # 2024joshiScalingSuperconductingQuantum
    RT:    null
    50K:   Fiber
    4K:    Fiber
    Still: Fiber
    CP:    Fiber
    MXC:   Fiber
  # FLUX_BIAS:  # [https://delft-circuits.com/product-overview/flux-lines/]
  #   RT:    null
  #   50K:   Ag
  #   4K:    Ag
  #   Still: NbTi
  #   CP:    NbTi
  #   MXC:   NbTi
  # COUPLER: # [https://delft-circuits.com/product-overview/flux-lines/]
  #   RT:    null
  #   50K:   Ag
  #   4K:    Ag
  #   Still: NbTi
  #   CP:    NbTi
  #   MXC:   NbTi
  PUMP: # [https://delft-circuits.com/product-overview/read-out-dc-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: Ag
    CP:    Ag
    MXC:   Ag
  READOUT_PIN: # 2024joshiScalingSuperconductingQuantum
    RT:    null
    50K:   Fiber
    4K:    Fiber
    Still: Fiber
    CP:    Fiber
    MXC:   Fiber
  READOUT_POUT: # [https://delft-circuits.com/product-overview/read-out-dc-lines/]
    RT:    null
    50K:   Ag
    4K:    Ag
    Still: NbTi
    CP:    NbTi
    MXC:   NbTi
  AMP_BIAS:  # DC Bias Lines
    RT:    null
    50K:   HEMT_Bias_Mn
    4K:    HEMT_Bias_Mn 
    Still: null
    CP:    null
    MXC:   null
  AMP_BIAS_50K:  # DC Bias Lines
    RT:    null
    50K:   HEMT_Bias_Mn
    4K:    null
    Still: null
    CP:    null
    MXC:   null
  DC_TERMINAL:  # Directional Coupler termination relocated to 4K
    RT:    null
    50K:   null
    4K:    null 
    Still: NbTi
    CP:    NbTi
    MXC:   NbTi

###################
# Activation Matrix
###################
# Describes which cables can perform what operations
ACTIVATION_MATRIX:
    DRIVE:
        - 1Q
        - 2Q
    # FLUX_BIAS: # always ON
    #     - IDLE
    # COUPLER: 
    #     - 2Q
    PUMP:
        - READOUT
    READOUT_PIN:
        - READOUT
    READOUT_POUT:
        - READOUT
    AMP_BIAS: # always ON
        - IDLE
    AMP_BIAS_50K: # always ON
        - IDLE
    DC_TERMINAL: # always ON
        - IDLE

